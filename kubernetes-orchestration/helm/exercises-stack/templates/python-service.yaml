apiVersion: v1
kind: Service
metadata:
  name: {{ include "exercises.fullname" . }}-python
  labels:
    {{- include "exercises.labels" . | nindent 4 }}
    app.kubernetes.io/component: python
spec:
  type: {{ .Values.python.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: python
  ports:
    - name: http
      port: {{ .Values.python.service.port }}
      targetPort: http
