server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /api/probe/java {
        proxy_pass http://java:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /api/probe/rust {
        proxy_pass http://rust:8082/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /api/probe/python {
        proxy_pass http://python:5000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /api/probe/prometheus {
        proxy_pass http://prometheus:9090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /api/probe/grafana {
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /api/probe/elasticsearch {
        proxy_pass http://elasticsearch:9200/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
