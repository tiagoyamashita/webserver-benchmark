# Application stack — postgres + redis + redisinsight + redisinsight-embed + kafka + java + python + rust + react-node.
#
# Start / restart apps only (observability can keep running):
#   podman compose -f docker-compose.apps.yml up -d --build
#   podman compose -f docker-compose.apps.yml restart java rust
#   podman compose -f docker-compose.apps.yml down
#
# Dev overlay: add -f docker-compose.dev.yml
#
# App JSON logging: EXERCISES_OBSERVABILITY=1 (Python/Rust/React Node) and Spring profile
# observability (Java). Optional overrides in .env.apps (see .env.apps.example).
services:
  postgres:
    image: docker.io/library/postgres:16
    networks: [exercises]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql-%Y-%m-%d
      - -c
      - log_destination=jsonlog
      - -c
      - log_rotation_age=1d
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_statement=mod
      - -c
      - log_duration=on
    volumes:
      - exercises_pg_data:/var/lib/postgresql/data
      - ./apps/postgres/logs:/var/log/postgresql

  redis:
    image: docker.io/library/redis:7-alpine
    networks: [exercises]
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - exercises_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  redisinsight:
    image: docker.io/redis/redisinsight:2.70.1
    networks: [exercises]
    ports:
      - "5540:5540"
    environment:
      RI_APP_PORT: "5540"
      RI_APP_HOST: "0.0.0.0"
      RI_EXTERNAL_URL: http://127.0.0.1:5540
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: exercises
    volumes:
      - exercises_redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5540/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  redisinsight-embed:
    image: docker.io/library/nginx:1.27-alpine
    networks: [exercises]
    ports:
      - "5541:80"
    volumes:
      - ./apps/redis/embed-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - redisinsight

  kafka:
    image: docker.io/apache/kafka:3.9.1
    hostname: kafka
    networks: [exercises]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
    volumes:
      - exercises_kafka_data:/var/lib/kafka/data
      - ./apps/kafka/config/log4j2.yaml:/opt/kafka/config/log4j2.yaml:ro
      - ./apps/kafka/logs:/var/log/kafka
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-broker-api-versions.sh",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  kafka-ui:
    image: docker.io/provectuslabs/kafka-ui:v0.7.2
    networks: [exercises]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: exercises
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  kafka-ui-embed:
    image: docker.io/library/nginx:1.27-alpine
    networks: [exercises]
    ports:
      - "8091:80"
    volumes:
      - ./apps/kafka/embed-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kafka-ui

  kafka-exporter:
    image: docker.io/danielqsj/kafka-exporter:v1.9.0
    networks: [exercises]
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - --kafka.server=kafka:9092
      - --web.listen-address=:9308
      - --log.level=info
    restart: unless-stopped

  java:
    build:
      context: ./apps/java
      dockerfile: Dockerfile
      args:
        SKIP_TESTS: "true"
        CACHE_BUST: ${CACHE_BUST:-1}
    networks: [exercises]
    env_file:
      - path: .env.apps
        required: false
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres,observability
      LOG_PATH: /app/logs
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_KAFKA_CREATE_USER_CONSUMER_GROUP: exercises-create-user
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      APP_STACK_RUST_BASE_URL: http://rust:8082
      APP_STACK_PYTHON_BASE_URL: http://python:5000
      APP_STACK_PROMETHEUS_BASE_URL: http://prometheus:9090
      APP_STACK_GRAFANA_BASE_URL: http://grafana:3000
      APP_STACK_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      APP_STACK_KIBANA_BASE_URL: http://kibana:5601
      APP_STACK_REACT_NODE_BASE_URL: http://react-node:5174
    volumes:
      - ./apps/java/logs:/app/logs
    depends_on:
      - postgres
      - redis

  python:
    build:
      context: ./apps/python
      dockerfile: Dockerfile
    networks: [exercises]
    env_file:
      - path: .env.apps
        required: false
    ports:
      - "5000:5000"
    environment:
      FLASK_RUN_HOST: "0.0.0.0"
      FLASK_RUN_PORT: "5000"
      EXERCISES_PROJECT_ROOT: /app
      EXERCISES_OBSERVABILITY: "1"
      LOG_PATH: /app/logs
      APP_STACK_JAVA_BASE_URL: http://java:8080
      APP_STACK_RUST_BASE_URL: http://rust:8082
      APP_STACK_PROMETHEUS_BASE_URL: http://prometheus:9090
      APP_STACK_GRAFANA_BASE_URL: http://grafana:3000
      APP_STACK_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      APP_STACK_KIBANA_BASE_URL: http://kibana:5601
      APP_STACK_REACT_NODE_BASE_URL: http://react-node:5174
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
    volumes:
      - ./apps/python/logs:/app/logs
    depends_on:
      - postgres
      - java

  rust:
    build:
      context: ./apps/rust
      dockerfile: Dockerfile
    networks: [exercises]
    env_file:
      - path: .env.apps
        required: false
    ports:
      - "8082:8082"
    environment:
      EXERCISES_WEB_HOST: "0.0.0.0"
      EXERCISES_WEB_PORT: "8082"
      EXERCISES_RUST_ROOT: /app
      EXERCISES_OBSERVABILITY: "1"
      LOG_PATH: /app/logs
      EXERCISES_JAVA_BASE_URL: http://java:8080
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CREATE_USER_TOPIC: create-user
      KAFKA_CREATE_USER_CONSUMER_GROUP: exercises-create-user
      KAFKA_CREATE_USER_PARTITIONS: "1"
      KAFKA_CREATE_USER_REPLICAS: "1"
      KAFKA_ADMIN_FAIL_FAST: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
    volumes:
      - ./apps/rust/logs:/app/logs
    depends_on:
      postgres:
        condition: service_started
      java:
        condition: service_started
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  react-node:
    build:
      context: ./apps/react-node
      dockerfile: Dockerfile
    networks: [exercises]
    env_file:
      - path: .env.apps
        required: false
    ports:
      - "5174:5174"
    environment:
      NODE_ENV: production
      PORT: "5174"
      EXERCISES_OBSERVABILITY: "1"
      LOG_PATH: /app/logs
      PROBE_JAVA_URL: http://java:8080
      PROBE_RUST_URL: http://rust:8082
      PROBE_PYTHON_URL: http://python:5000
      PROBE_PROMETHEUS_URL: http://prometheus:9090
      PROBE_GRAFANA_URL: http://grafana:3000
      PROBE_ELASTICSEARCH_URL: http://elasticsearch:9200
      PROBE_KIBANA_URL: http://kibana:5601
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
    volumes:
      - ./apps/react-node/logs:/app/logs
    depends_on:
      - postgres
      - java
      - python
      - rust
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5174/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  exercises:
    name: exercises
    driver: bridge

volumes:
  exercises_pg_data:
  exercises_redis_data:
  exercises_redisinsight_data:
  exercises_kafka_data:
