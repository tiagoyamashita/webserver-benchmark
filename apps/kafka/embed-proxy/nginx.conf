# Reverse proxy for provectuslabs/kafka-ui with headers suitable for <iframe> embed
# in Java / Python / Rust dashboards (local exercises only).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream kafka_ui_upstream {
    server kafka-ui:8080;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://kafka_ui_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "frame-ancestors *" always;
    }
}
