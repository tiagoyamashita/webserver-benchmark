<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello Zig — stack dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #121212;
        --panel-bg: #18181b;
        --text: #e8e8ea;
        --muted: #a3a3a8;
        --border: #3f3f46;
        --nav-bg: #1c1c1f;
        --th-bg: #27272a;
        --code-bg: #27272a;
        --ok: #4ade80;
        --err: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }
      .page-header {
        padding: 1rem 1.15rem 0.5rem;
        border-bottom: 1px solid var(--border);
      }
      .page-top-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem 1.5rem;
      }
      .page-top-bar-left { flex: 1 1 20rem; min-width: 0; }
      .page-top-bar-right {
        flex: 0 1 auto;
        margin-left: auto;
        text-align: right;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.35rem;
      }
      .header-login-form[hidden],
      .header-user-panel[hidden],
      .header-auth-loading[hidden] {
        display: none !important;
      }
      .header-login-form:not([hidden]) {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
        justify-content: flex-end;
      }
      .header-login-form input {
        padding: 0.35rem 0.5rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--code-bg);
        color: var(--text);
        font-size: 0.85rem;
        min-width: 8rem;
      }
      .header-user-panel:not([hidden]) {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        justify-content: flex-end;
      }
      .header-user-label { font-size: 0.88rem; font-weight: 600; }
      .header-auth-loading { margin: 0; font-size: 0.85rem; color: var(--muted); }
      .header-login-error { width: 100%; font-size: 0.82rem; color: var(--err); text-align: right; }
      .page-meta { margin: 0.35rem 0 0; font-size: 0.88rem; color: var(--muted); }
      h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
      .subtitle { color: var(--muted); margin: 0; font-size: 0.92rem; }
      .dashboard {
        display: flex;
        min-height: calc(100vh - 5.5rem);
      }
      .sidebar {
        flex: 0 0 13.5rem;
        width: 13.5rem;
        min-width: 13.5rem;
        padding: 0.75rem 0.6rem;
        border-right: 1px solid var(--border);
        background: var(--nav-bg);
      }
      .sidebar-title {
        margin: 0 0 0.6rem;
        padding: 0 0.5rem;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .sidebar-btn {
        display: block;
        width: 100%;
        cursor: pointer;
        text-align: left;
        padding: 0.55rem 0.65rem;
        margin-bottom: 0.2rem;
        font-size: 0.88rem;
        font-weight: 600;
        border-radius: 6px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
      }
      .sidebar-btn:hover {
        color: var(--text);
        background: rgba(128, 128, 128, 0.15);
      }
      .sidebar-btn[aria-current="page"] {
        color: var(--text);
        background: var(--bg);
        border-color: var(--border);
      }
      .main-panel {
        flex: 1 1 auto;
        min-width: 0;
        padding: 1rem 1.15rem;
      }
      .view-section {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
        background: var(--panel-bg);
      }
      h2 { margin: 0 0 0.75rem; font-size: 1.05rem; }
      .hint { color: var(--muted); font-size: 0.88rem; margin: 0 0 0.75rem; line-height: 1.45; }
      code {
        background: var(--code-bg);
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
        font-size: 0.9em;
      }
      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      th, td { border: 1px solid var(--border); padding: 0.45rem 0.55rem; text-align: left; }
      th { background: var(--th-bg); }
      .muted { color: #b8b8be; }
      .ok { color: var(--ok); font-weight: 600; }
      .err { color: var(--err); font-weight: 600; }
      #items-status-row td { font-size: 0.9rem; }
      .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.75rem; }
      input[type="text"] {
        min-width: 14rem;
        padding: 0.4rem 0.55rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--code-bg);
        color: var(--text);
      }
      button, .btn {
        cursor: pointer;
        padding: 0.4rem 0.55rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--code-bg);
        color: var(--text);
        font-weight: 600;
      }
      a.btn { text-decoration: none; display: inline-block; }
      .htmx-indicator { display: none; }
      .htmx-request .htmx-indicator { display: inline; }
      .htmx-request.htmx-indicator { display: inline; }
      .panel-loading { color: var(--muted); font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <header class="page-header">
      <div class="page-top-bar">
        <div class="page-top-bar-left">
          <h1>Hello Zig</h1>
          <p class="subtitle">Exercises stack dashboard — pick a section from the menu.</p>
        </div>
        <div class="page-top-bar-right" id="header-auth-panel">
          <p class="header-auth-loading" id="header-auth-loading">Loading session…</p>
          <form id="header-login-form" class="header-login-form" hidden autocomplete="on">
            <input type="email" id="header-login-email" name="email" placeholder="Email" autocomplete="username" required />
            <input type="password" id="header-login-password" name="password" placeholder="Password" autocomplete="current-password" />
            <button type="submit" class="btn">Sign in</button>
            <span id="header-login-error" class="header-login-error" hidden></span>
          </form>
          <div id="header-user-panel" class="header-user-panel" hidden>
            <span id="header-user-label" class="header-user-label"></span>
            <button type="button" class="btn" id="header-logout-btn">Logout</button>
          </div>
        </div>
      </div>
      <p class="page-meta">
        Session ID: <code id="page-session-id">…</code> · Redis: <code id="page-session-redis-key">…</code>
      </p>
    </header>

    <div class="dashboard">
      <nav class="sidebar" aria-label="Dashboard menu">
        <p class="sidebar-title">Menu</p>
        <button type="button"
                class="sidebar-btn"
                aria-current="page"
                data-nav="home"
                hx-get="/htmx/view/home"
                hx-target="#main-panel"
                hx-swap="innerHTML"
                hx-on:htmx:after-request="document.querySelectorAll('.sidebar-btn').forEach(function(b){ b.removeAttribute('aria-current'); }); this.setAttribute('aria-current', 'page');">
          Home
        </button>
        <button type="button"
                class="sidebar-btn"
                data-nav="stack"
                hx-get="/htmx/view/stack"
                hx-target="#main-panel"
                hx-swap="innerHTML"
                hx-on:htmx:after-request="document.querySelectorAll('.sidebar-btn').forEach(function(b){ b.removeAttribute('aria-current'); }); this.setAttribute('aria-current', 'page');">
          Stack connectivity
        </button>
        <button type="button"
                class="sidebar-btn"
                data-nav="items"
                hx-get="/htmx/view/items"
                hx-target="#main-panel"
                hx-swap="innerHTML"
                hx-on:htmx:after-request="document.querySelectorAll('.sidebar-btn').forEach(function(b){ b.removeAttribute('aria-current'); }); this.setAttribute('aria-current', 'page');">
          Items (Postgres)
        </button>
        <button type="button"
                class="sidebar-btn"
                data-nav="observability"
                hx-get="/htmx/view/observability"
                hx-target="#main-panel"
                hx-swap="innerHTML"
                hx-on:htmx:after-request="document.querySelectorAll('.sidebar-btn').forEach(function(b){ b.removeAttribute('aria-current'); }); this.setAttribute('aria-current', 'page');">
          Observability
        </button>
      </nav>

      <main id="main-panel"
            class="main-panel"
            hx-get="/htmx/view/home"
            hx-trigger="load"
            hx-swap="innerHTML"
            hx-on::after-settle="htmx.process(event.detail.elt)">
        <p class="panel-loading">Loading…</p>
      </main>
    </div>
    <script>
      (function (global) {
        var LEGACY_STORAGE_KEY = "exercises_session_id";
        function clearLegacyStoredSessionId() {
          try { global.localStorage.removeItem(LEGACY_STORAGE_KEY); } catch (e) { /* ignore */ }
        }
        function newRequestId() {
          if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
          return "req-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
        }
        function withSessionHeaders(headers) { return headers || {}; }
        function ensureSession() {
          clearLegacyStoredSessionId();
          return global.fetch("/api/auth/ensure", {
            method: "POST",
            credentials: "same-origin",
            headers: { Accept: "application/json", "Content-Type": "application/json", "X-Request-ID": newRequestId() },
            body: "{}"
          }).then(function (res) {
            return res.text().then(function (text) {
              var data = text;
              try { data = JSON.parse(text); } catch (e) { /* plain */ }
              return { ok: res.ok, status: res.status, data: data };
            });
          }).then(function (r) {
            if (!r.ok || !r.data || !r.data.sessionId) throw new Error("Session ensure failed: HTTP " + r.status);
            return r.data;
          });
        }
        clearLegacyStoredSessionId();
        global.exercisesSession = { withSessionHeaders: withSessionHeaders, ensureSession: ensureSession };
      })(window);
    </script>
    <script>
      (function (global) {
        function isLoggedInSession(data) {
          return !!(data && data.sessionId && data.userId > 0 && data.email);
        }
        function setVisible(el, visible, displayMode) {
          if (!el) return;
          el.hidden = !visible;
          el.style.display = visible ? displayMode : "none";
        }
        function setLoginError(message) {
          var el = document.getElementById("header-login-error");
          if (!el) return;
          if (!message) { el.textContent = ""; el.hidden = true; el.style.display = "none"; return; }
          el.textContent = message;
          el.hidden = false;
          el.style.display = "block";
        }
        function updateHeaderAuthPanel(data) {
          var form = document.getElementById("header-login-form");
          var userPanel = document.getElementById("header-user-panel");
          var loading = document.getElementById("header-auth-loading");
          var label = document.getElementById("header-user-label");
          if (!form || !userPanel) return;
          setVisible(loading, false, "block");
          if (isLoggedInSession(data)) {
            setLoginError("");
            setVisible(form, false, "flex");
            setVisible(userPanel, true, "flex");
            if (label) label.textContent = String(data.name || "User") + " · " + String(data.email);
            return;
          }
          setVisible(userPanel, false, "flex");
          setVisible(form, true, "flex");
        }
        function wireLoginForm(submitLogin) {
          var form = document.getElementById("header-login-form");
          if (!form || typeof submitLogin !== "function") return;
          form.addEventListener("submit", function (ev) {
            ev.preventDefault();
            var emailEl = document.getElementById("header-login-email");
            var passwordEl = document.getElementById("header-login-password");
            var email = emailEl && emailEl.value ? emailEl.value.trim() : "";
            var password = passwordEl && passwordEl.value ? passwordEl.value : "";
            if (!email) { setLoginError("Email is required."); return; }
            setLoginError("");
            submitLogin(email, password);
          });
        }
        function wireLogoutButton(performLogout) {
          var btn = document.getElementById("header-logout-btn");
          if (!btn || typeof performLogout !== "function") return;
          btn.addEventListener("click", function () { performLogout(); });
        }
        global.exercisesHeaderAuth = {
          isLoggedInSession: isLoggedInSession,
          updateHeaderAuthPanel: updateHeaderAuthPanel,
          setLoginError: setLoginError,
          wireLoginForm: wireLoginForm,
          wireLogoutButton: wireLogoutButton
        };
      })(window);
    </script>
    <script>
      window.exercisesSession.ensureSession().then(function () {
        (function () {
          function newRequestId() {
            if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
            return "req-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
          }
          function apiRequest(extra) {
            var headers = window.exercisesSession.withSessionHeaders({
              "X-Request-ID": newRequestId(),
              Accept: "application/json"
            });
            if (extra) Object.keys(extra).forEach(function (key) { headers[key] = extra[key]; });
            return { headers: headers };
          }
          function renderSessionStatus(data) {
            var pageSessionIdEl = document.getElementById("page-session-id");
            var redisKeyEl = document.getElementById("page-session-redis-key");
            if (!data || !data.sessionId) {
              if (pageSessionIdEl) pageSessionIdEl.textContent = "—";
              if (redisKeyEl) redisKeyEl.textContent = "—";
              window.exercisesHeaderAuth.updateHeaderAuthPanel(null);
              return;
            }
            if (pageSessionIdEl) pageSessionIdEl.textContent = data.sessionId;
            if (redisKeyEl) redisKeyEl.textContent = data.redisKey || "—";
            window.exercisesHeaderAuth.updateHeaderAuthPanel(data);
          }
          function refreshSessionHeader() {
            return fetch("/api/auth/session", {
              method: "GET",
              credentials: "same-origin",
              headers: apiRequest().headers
            }).then(function (res) {
              return res.text().then(function (text) {
                var data = text;
                try { data = JSON.parse(text); } catch (e) { /* plain */ }
                return { ok: res.ok, status: res.status, data: data };
              });
            }).then(function (r) {
              if (r.ok && r.data && r.data.sessionId) {
                renderSessionStatus(r.data);
                return r.data;
              }
              return window.exercisesSession.ensureSession().then(function (s) {
                renderSessionStatus(s);
                return s;
              });
            }).catch(function () {
              return window.exercisesSession.ensureSession().then(function (s) {
                renderSessionStatus(s);
                return s;
              });
            });
          }
          function performHeaderLogin(email, password) {
            var body = { email: email };
            if (password) body.password = password;
            fetch("/api/auth/login", {
              method: "POST",
              credentials: "same-origin",
              headers: apiRequest({ "Content-Type": "application/json" }).headers,
              body: JSON.stringify(body)
            }).then(function (res) {
              return res.text().then(function (text) {
                var data = text;
                try { data = JSON.parse(text); } catch (e) { /* plain */ }
                return { ok: res.ok, status: res.status, data: data };
              });
            }).then(function (r) {
              if (!r.ok) {
                window.exercisesHeaderAuth.setLoginError(
                  "Sign in failed" + (r.data && r.data.error ? ": " + r.data.error : " (HTTP " + r.status + ")")
                );
                return;
              }
              renderSessionStatus(r.data);
            }).catch(function (err) {
              window.exercisesHeaderAuth.setLoginError(String(err.message || err));
            });
          }
          function performLogout() {
            fetch("/api/auth/logout", {
              method: "POST",
              credentials: "same-origin",
              headers: apiRequest().headers
            }).then(function () {
              renderSessionStatus(null);
              return window.exercisesSession.ensureSession();
            }).then(function (s) {
              if (s) renderSessionStatus(s);
            }).catch(function (err) {
              window.exercisesHeaderAuth.setLoginError(String(err.message || err));
            });
          }
          window.exercisesHeaderAuth.wireLoginForm(performHeaderLogin);
          window.exercisesHeaderAuth.wireLogoutButton(performLogout);
          document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "visible") refreshSessionHeader();
          });
          refreshSessionHeader();
        })();
      }).catch(function (err) {
        console.error("[zig] session bootstrap failed", err);
        if (window.exercisesHeaderAuth) {
          window.exercisesHeaderAuth.updateHeaderAuthPanel(null);
          window.exercisesHeaderAuth.setLoginError("Session unavailable (is Redis up?)");
        }
        var pageSessionIdEl = document.getElementById("page-session-id");
        if (pageSessionIdEl) pageSessionIdEl.textContent = "unavailable";
        var redisKeyEl = document.getElementById("page-session-redis-key");
        if (redisKeyEl) redisKeyEl.textContent = "—";
      });
    </script>
  </body>
</html>
