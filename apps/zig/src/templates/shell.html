<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello Zig — stack dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #121212;
        --panel-bg: #18181b;
        --text: #e8e8ea;
        --muted: #a3a3a8;
        --border: #3f3f46;
        --nav-bg: #1c1c1f;
        --th-bg: #27272a;
        --code-bg: #27272a;
        --ok: #4ade80;
        --err: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }
      .page-header {
        padding: 1rem 1.15rem 0.5rem;
        border-bottom: 1px solid var(--border);
      }
      .page-top-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem 1.5rem;
      }
      .page-top-bar-left { flex: 1 1 20rem; min-width: 0; }
      .page-top-bar-right {
        flex: 0 1 auto;
        margin-left: auto;
        text-align: right;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.35rem;
      }
      .header-login-form[hidden],
      .header-user-panel[hidden],
      .header-auth-loading[hidden] {
        display: none !important;
      }
      .header-login-form:not([hidden]) {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
        justify-content: flex-end;
      }
      .header-login-form input {
        padding: 0.35rem 0.5rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--code-bg);
        color: var(--text);
        font-size: 0.85rem;
        min-width: 8rem;
      }
      .header-user-panel:not([hidden]) {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        justify-content: flex-end;
      }
      .header-user-label { font-size: 0.88rem; font-weight: 600; }
      .header-auth-loading { margin: 0; font-size: 0.85rem; color: var(--muted); }
      .header-login-error { width: 100%; font-size: 0.82rem; color: var(--err); text-align: right; }
      .page-meta { margin: 0.35rem 0 0; font-size: 0.88rem; color: var(--muted); }
      .auth-gate {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem 0;
      }
      .auth-gate-card {
        width: 100%;
        max-width: 24rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1.5rem 1.35rem;
        background: rgba(128, 128, 128, 0.04);
      }
      .auth-gate-card h1 { margin: 0 0 0.35rem; font-size: 1.35rem; }
      .auth-gate-lead { color: var(--muted); font-size: 0.9rem; margin: 0 0 1rem; line-height: 1.45; }
      .auth-gate-tabs { display: flex; gap: 0.35rem; margin-bottom: 1rem; }
      .auth-tab {
        flex: 1 1 auto;
        cursor: pointer;
        padding: 0.45rem 0.6rem;
        font-size: 0.85rem;
        font-weight: 600;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
      }
      .auth-tab.active { color: var(--text); background: var(--code-bg); border-color: var(--text); }
      .gate-form .field-row { margin-bottom: 0.75rem; }
      .gate-form label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; }
      .gate-form input {
        width: 100%;
        padding: 0.45rem 0.55rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--code-bg);
        color: var(--text);
        font-size: 0.9rem;
      }
      .gate-auth-error { margin: 0.75rem 0 0; font-size: 0.85rem; color: var(--err); }
      .btn.primary { border-color: var(--ok); color: var(--ok); }
      h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
      .subtitle { color: var(--muted); margin: 0; font-size: 0.92rem; }
      .dashboard {
        display: flex;
        min-height: calc(100vh - 5.5rem);
      }
      .sidebar {
        flex: 0 0 13.5rem;
        width: 13.5rem;
        min-width: 13.5rem;
        padding: 0.75rem 0.6rem;
        border-right: 1px solid var(--border);
        background: var(--nav-bg);
      }
      .sidebar-title {
        margin: 0 0 0.6rem;
        padding: 0 0.5rem;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .sidebar-btn {
        display: block;
        width: 100%;
        cursor: pointer;
        text-align: left;
        padding: 0.55rem 0.65rem;
        margin-bottom: 0.2rem;
        font-size: 0.88rem;
        font-weight: 600;
        border-radius: 6px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
      }
      .sidebar-btn:hover {
        color: var(--text);
        background: rgba(128, 128, 128, 0.15);
      }
      .sidebar-btn[aria-current="page"] {
        color: var(--text);
        background: var(--bg);
        border-color: var(--border);
      }
      .main-panel {
        flex: 1 1 auto;
        min-width: 0;
        padding: 1rem 1.15rem;
      }
      .view-section {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
        background: var(--panel-bg);
      }
      h2 { margin: 0 0 0.75rem; font-size: 1.05rem; }
      .hint { color: var(--muted); font-size: 0.88rem; margin: 0 0 0.75rem; line-height: 1.45; }
      code {
        background: var(--code-bg);
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
        font-size: 0.9em;
      }
      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      th, td { border: 1px solid var(--border); padding: 0.45rem 0.55rem; text-align: left; }
      th { background: var(--th-bg); }
      .muted { color: #b8b8be; }
      .ok { color: var(--ok); font-weight: 600; }
      .err { color: var(--err); font-weight: 600; }
      #items-status-row td { font-size: 0.9rem; }
      .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.75rem; }
      input[type="text"] {
        min-width: 14rem;
        padding: 0.4rem 0.55rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--code-bg);
        color: var(--text);
      }
      button, .btn {
        cursor: pointer;
        padding: 0.4rem 0.55rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--code-bg);
        color: var(--text);
        font-weight: 600;
      }
      a.btn { text-decoration: none; display: inline-block; }
      .htmx-indicator { display: none; }
      .htmx-request .htmx-indicator { display: inline; }
      .htmx-request.htmx-indicator { display: inline; }
      .panel-loading { color: var(--muted); font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <section id="auth-gate" class="auth-gate">
      <div class="auth-gate-card">
        <h1>Hello Zig</h1>
        <p class="auth-gate-lead">Sign in or create an account to open the dashboard.</p>
        <div class="auth-gate-tabs" role="tablist">
          <button type="button" class="auth-tab active" data-auth-tab="login" role="tab" aria-selected="true">Sign in</button>
          <button type="button" class="auth-tab" data-auth-tab="register" role="tab" aria-selected="false">Create account</button>
        </div>
        <form id="gate-login-form" class="gate-form" autocomplete="on">
          <div class="field-row"><label for="gate-login-email">Email</label><input type="email" id="gate-login-email" required autocomplete="username" /></div>
          <div class="field-row"><label for="gate-login-password">Password</label><input type="password" id="gate-login-password" required autocomplete="current-password" /></div>
          <button type="submit" class="btn primary" style="width:100%">Sign in</button>
        </form>
        <form id="gate-register-form" class="gate-form" hidden autocomplete="on">
          <div class="field-row"><label for="gate-register-name">Name</label><input type="text" id="gate-register-name" required autocomplete="name" /></div>
          <div class="field-row"><label for="gate-register-email">Email</label><input type="email" id="gate-register-email" required autocomplete="email" /></div>
          <div class="field-row"><label for="gate-register-password">Password</label><input type="password" id="gate-register-password" required minlength="8" autocomplete="new-password" /></div>
          <button type="submit" class="btn primary" style="width:100%">Create account</button>
        </form>
        <p id="gate-auth-error" class="gate-auth-error" hidden></p>
      </div>
    </section>

    <div id="app-shell" hidden>
    <header class="page-header">
      <div class="page-top-bar">
        <div class="page-top-bar-left">
          <h1>Hello Zig</h1>
          <p class="subtitle">WebServer BenchMark stack dashboard — pick a section from the menu.</p>
        </div>
        <div class="page-top-bar-right" id="header-auth-panel">
          <div id="header-user-panel" class="header-user-panel" hidden>
            <span id="header-user-label" class="header-user-label"></span>
            <button type="button" class="btn" id="header-logout-btn">Logout</button>
          </div>
        </div>
      </div>
      <p class="page-meta">
        Session ID: <code id="page-session-id">…</code> · Redis: <code id="page-session-redis-key">…</code>
      </p>
    </header>

    <div class="dashboard">
      <nav class="sidebar" aria-label="Dashboard menu">
        <p class="sidebar-title">Menu</p>
        <button type="button"
                class="sidebar-btn"
                aria-current="page"
                data-nav="home"
                hx-get="/htmx/view/home"
                hx-target="#main-panel"
                hx-swap="innerHTML"
                hx-on:htmx:after-request="document.querySelectorAll('.sidebar-btn').forEach(function(b){ b.removeAttribute('aria-current'); }); this.setAttribute('aria-current', 'page');">
          Home
        </button>
        <button type="button"
                class="sidebar-btn"
                data-nav="stack"
                hx-get="/htmx/view/stack"
                hx-target="#main-panel"
                hx-swap="innerHTML"
                hx-on:htmx:after-request="document.querySelectorAll('.sidebar-btn').forEach(function(b){ b.removeAttribute('aria-current'); }); this.setAttribute('aria-current', 'page');">
          Stack connectivity
        </button>
        <button type="button"
                class="sidebar-btn"
                data-nav="items"
                hx-get="/htmx/view/items"
                hx-target="#main-panel"
                hx-swap="innerHTML"
                hx-on:htmx:after-request="document.querySelectorAll('.sidebar-btn').forEach(function(b){ b.removeAttribute('aria-current'); }); this.setAttribute('aria-current', 'page');">
          Items (Postgres)
        </button>
        <button type="button"
                class="sidebar-btn"
                data-nav="observability"
                hx-get="/htmx/view/observability"
                hx-target="#main-panel"
                hx-swap="innerHTML"
                hx-on:htmx:after-request="document.querySelectorAll('.sidebar-btn').forEach(function(b){ b.removeAttribute('aria-current'); }); this.setAttribute('aria-current', 'page');">
          Observability
        </button>
      </nav>

      <main id="main-panel"
            class="main-panel"
            hx-get="/htmx/view/home"
            hx-trigger="load"
            hx-swap="innerHTML"
            hx-on::after-settle="htmx.process(event.detail.elt)">
        <p class="panel-loading">Loading…</p>
      </main>
    </div>
    </div>
    <script>
      (function (global) {
        var LEGACY_STORAGE_KEY = "webserver_benchmark_session_id";
        function clearLegacyStoredSessionId() {
          try { global.localStorage.removeItem(LEGACY_STORAGE_KEY); } catch (e) { /* ignore */ }
        }
        function newRequestId() {
          if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
          return "req-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
        }
        function withSessionHeaders(headers) { return headers || {}; }
        function ensureSession() {
          clearLegacyStoredSessionId();
          return global.fetch("/api/auth/ensure", {
            method: "POST",
            credentials: "same-origin",
            headers: { Accept: "application/json", "Content-Type": "application/json", "X-Request-ID": newRequestId() },
            body: "{}"
          }).then(function (res) {
            return res.text().then(function (text) {
              var data = text;
              try { data = JSON.parse(text); } catch (e) { /* plain */ }
              return { ok: res.ok, status: res.status, data: data };
            });
          }).then(function (r) {
            if (!r.ok || !r.data || !r.data.sessionId) throw new Error("Session ensure failed: HTTP " + r.status);
            return r.data;
          });
        }
        clearLegacyStoredSessionId();
        global.webserverBenchmarkSession = { withSessionHeaders: withSessionHeaders, ensureSession: ensureSession };
      })(window);
    </script>
    <script>
      (function (global) {
        function isLoggedInSession(data) {
          return !!(data && data.sessionId && data.userId > 0 && data.email);
        }
        function setVisible(el, visible, displayMode) {
          if (!el) return;
          el.hidden = !visible;
          el.style.display = visible ? displayMode : "none";
        }
        function updateHeaderAuthPanel(data) {
          var userPanel = document.getElementById("header-user-panel");
          var label = document.getElementById("header-user-label");
          if (!userPanel) return;
          if (isLoggedInSession(data)) {
            setVisible(userPanel, true, "flex");
            if (label) label.textContent = String(data.name || "User") + " · " + String(data.email);
            return;
          }
          setVisible(userPanel, false, "flex");
        }
        function wireLogoutButton(performLogout) {
          var btn = document.getElementById("header-logout-btn");
          if (!btn || typeof performLogout !== "function") return;
          btn.addEventListener("click", function () { performLogout(); });
        }
        global.webserverBenchmarkHeaderAuth = {
          isLoggedInSession: isLoggedInSession,
          updateHeaderAuthPanel: updateHeaderAuthPanel,
          wireLogoutButton: wireLogoutButton
        };
      })(window);
    </script>
    <script>
      (function (global) {
        function isLoggedInSession(data) {
          return !!(data && data.sessionId && data.userId > 0 && data.email);
        }
        function setVisible(el, visible, displayMode) {
          if (!el) return;
          el.hidden = !visible;
          el.style.display = visible ? displayMode : "none";
        }
        function setGateError(message) {
          var el = document.getElementById("gate-auth-error");
          if (!el) return;
          if (!message) { el.textContent = ""; el.hidden = true; el.style.display = "none"; return; }
          el.textContent = message;
          el.hidden = false;
          el.style.display = "block";
        }
        function showAuthTab(tab) {
          var loginForm = document.getElementById("gate-login-form");
          var registerForm = document.getElementById("gate-register-form");
          document.querySelectorAll("[data-auth-tab]").forEach(function (btn) {
            var active = btn.getAttribute("data-auth-tab") === tab;
            btn.classList.toggle("active", active);
            btn.setAttribute("aria-selected", active ? "true" : "false");
          });
          setVisible(loginForm, tab === "login", "block");
          setVisible(registerForm, tab === "register", "block");
        }
        function applyAuthGate(data) {
          var gate = document.getElementById("auth-gate");
          var shell = document.getElementById("app-shell");
          if (!gate || !shell) return;
          var loggedIn = isLoggedInSession(data);
          setVisible(gate, !loggedIn, "flex");
          setVisible(shell, loggedIn, "block");
          if (loggedIn && global.webserverBenchmarkHeaderAuth) global.webserverBenchmarkHeaderAuth.updateHeaderAuthPanel(data);
        }
        function wireAuthGate(handlers) {
          document.querySelectorAll("[data-auth-tab]").forEach(function (btn) {
            btn.addEventListener("click", function () {
              showAuthTab(btn.getAttribute("data-auth-tab"));
              setGateError("");
            });
          });
          showAuthTab("login");
          var loginForm = document.getElementById("gate-login-form");
          if (loginForm) {
            loginForm.addEventListener("submit", function (ev) {
              ev.preventDefault();
              var email = (document.getElementById("gate-login-email").value || "").trim();
              var password = document.getElementById("gate-login-password").value || "";
              if (!email) { setGateError("Email is required."); return; }
              setGateError("");
              if (handlers && handlers.onLogin) handlers.onLogin(email, password);
            });
          }
          var registerForm = document.getElementById("gate-register-form");
          if (registerForm) {
            registerForm.addEventListener("submit", function (ev) {
              ev.preventDefault();
              var name = (document.getElementById("gate-register-name").value || "").trim();
              var email = (document.getElementById("gate-register-email").value || "").trim();
              var password = document.getElementById("gate-register-password").value || "";
              if (!name || !email || password.length < 8) {
                setGateError("Name, email, and password (min 8 characters) are required.");
                return;
              }
              setGateError("");
              if (handlers && handlers.onRegister) handlers.onRegister(name, email, password);
            });
          }
        }
        global.webserverBenchmarkAuthGate = {
          isLoggedInSession: isLoggedInSession,
          applyAuthGate: applyAuthGate,
          setGateError: setGateError,
          wireAuthGate: wireAuthGate
        };
      })(window);
    </script>
    <script>
      window.webserverBenchmarkSession.ensureSession().then(function () {
        (function () {
          function newRequestId() {
            if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
            return "req-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
          }
          function apiRequest(extra) {
            var headers = window.webserverBenchmarkSession.withSessionHeaders({
              "X-Request-ID": newRequestId(),
              Accept: "application/json"
            });
            if (extra) Object.keys(extra).forEach(function (key) { headers[key] = extra[key]; });
            return { headers: headers };
          }
          function renderSessionStatus(data) {
            var pageSessionIdEl = document.getElementById("page-session-id");
            var redisKeyEl = document.getElementById("page-session-redis-key");
            if (!data || !data.sessionId) {
              if (pageSessionIdEl) pageSessionIdEl.textContent = "—";
              if (redisKeyEl) redisKeyEl.textContent = "—";
              if (window.webserverBenchmarkAuthGate) window.webserverBenchmarkAuthGate.applyAuthGate(null);
              return;
            }
            if (pageSessionIdEl) pageSessionIdEl.textContent = data.sessionId;
            if (redisKeyEl) redisKeyEl.textContent = data.redisKey || "—";
            if (window.webserverBenchmarkAuthGate) window.webserverBenchmarkAuthGate.applyAuthGate(data);
          }
          function refreshSessionHeader() {
            return fetch("/api/auth/session", {
              method: "GET",
              credentials: "same-origin",
              headers: apiRequest().headers
            }).then(function (res) {
              return res.text().then(function (text) {
                var data = text;
                try { data = JSON.parse(text); } catch (e) { /* plain */ }
                return { ok: res.ok, status: res.status, data: data };
              });
            }).then(function (r) {
              if (r.ok && r.data && r.data.sessionId) {
                renderSessionStatus(r.data);
                return r.data;
              }
              return window.webserverBenchmarkSession.ensureSession().then(function (s) {
                renderSessionStatus(s);
                return s;
              });
            }).catch(function () {
              return window.webserverBenchmarkSession.ensureSession().then(function (s) {
                renderSessionStatus(s);
                return s;
              });
            });
          }
          function performGateLogin(email, password) {
            var body = { email: email };
            if (password) body.password = password;
            return fetch("/api/auth/login", {
              method: "POST",
              credentials: "same-origin",
              headers: apiRequest({ "Content-Type": "application/json" }).headers,
              body: JSON.stringify(body)
            }).then(function (res) {
              return res.text().then(function (text) {
                var data = text;
                try { data = JSON.parse(text); } catch (e) { /* plain */ }
                return { ok: res.ok, status: res.status, data: data };
              });
            }).then(function (r) {
              if (!r.ok) {
                window.webserverBenchmarkAuthGate.setGateError(
                  "Sign in failed" + (r.data && r.data.error ? ": " + r.data.error : " (HTTP " + r.status + ")")
                );
                return;
              }
              renderSessionStatus(r.data);
            }).catch(function (err) {
              window.webserverBenchmarkAuthGate.setGateError(String(err.message || err));
            });
          }
          function performGateRegister(name, email, password) {
            return fetch("/api/users", {
              method: "POST",
              credentials: "same-origin",
              headers: apiRequest({ "Content-Type": "application/json" }).headers,
              body: JSON.stringify({ name: name, email: email, password: password })
            }).then(function (res) {
              return res.text().then(function (text) {
                var data = text;
                try { data = JSON.parse(text); } catch (e) { /* plain */ }
                return { ok: res.ok, status: res.status, data: data };
              });
            }).then(function (r) {
              if (!r.ok) {
                var msg = r.data && r.data.error ? r.data.error : String(r.data || r.status);
                window.webserverBenchmarkAuthGate.setGateError("Create account failed: " + msg);
                return;
              }
              return performGateLogin(email, password);
            }).catch(function (err) {
              window.webserverBenchmarkAuthGate.setGateError(String(err.message || err));
            });
          }
          function performLogout() {
            fetch("/api/auth/logout", {
              method: "POST",
              credentials: "same-origin",
              headers: apiRequest().headers
            }).then(function (res) {
              return res.text().then(function (text) {
                var data = null;
                if (text) {
                  try { data = JSON.parse(text); } catch (e) { /* plain */ }
                }
                if (res.ok && data && data.sessionId) return data;
                if (!res.ok) {
                  throw new Error("Logout failed (HTTP " + res.status + ")");
                }
                return window.webserverBenchmarkSession.ensureSession();
              });
            }).then(function (s) {
              renderSessionStatus(s);
            }).catch(function (err) {
              window.webserverBenchmarkAuthGate.setGateError(String(err.message || err));
            });
          }
          window.webserverBenchmarkHeaderAuth.wireLogoutButton(performLogout);
          window.webserverBenchmarkAuthGate.wireAuthGate({
            onLogin: function (email, password) { performGateLogin(email, password); },
            onRegister: function (name, email, password) { performGateRegister(name, email, password); }
          });
          document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "visible") refreshSessionHeader();
          });
          refreshSessionHeader();
        })();
      }).catch(function (err) {
        console.error("[zig] session bootstrap failed", err);
        if (window.webserverBenchmarkAuthGate) window.webserverBenchmarkAuthGate.setGateError("Session unavailable (is Redis up?)");
        var pageSessionIdEl = document.getElementById("page-session-id");
        if (pageSessionIdEl) pageSessionIdEl.textContent = "unavailable";
        var redisKeyEl = document.getElementById("page-session-redis-key");
        if (redisKeyEl) redisKeyEl.textContent = "—";
      });
    </script>
  </body>
</html>
