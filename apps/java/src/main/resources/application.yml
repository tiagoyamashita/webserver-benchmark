spring:
  application:
    name: webserver-benchmark-java
  thymeleaf:
    cache: false
  # Default: in-memory H2 (no PostgreSQL required). Use profile "postgres" when ready.
  datasource:
    url: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    admin:
      # Fail startup if Kafka is unreachable or topic admin (create-user) cannot be applied.
      fail-fast: true
      auto-create: true

server:
  port: 8080

springdoc:
  paths-to-match: /api/**
  paths-to-exclude:
    - /api/dashboard-meta
    - /api/dashboard/**
    - /api/observability/**
    - /api/hello-from-rust
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

app:
  session:
    redis-key-prefix: "webserver-benchmark:session:"
    ttl: PT24H
    cookie-name: webserver_benchmark_session
  kafka:
    create-user-topic: create-user
    create-user-consumer-group: webserver-benchmark-create-user
    create-user-partitions: 1
    create-user-replicas: 1
    create-item-topic: create-item
    create-item-partitions: 1
    create-item-replicas: 1
  project:
    # Optional: absolute path to the directory that contains pom.xml (otherwise auto-detected).
    module-dir: ""
  # Outbound GET from "GET Rust/Python/Prometheus" on the home page (Java server-side, not the browser).
  # Local ./mvnw: 127.0.0.1. Compose sets APP_STACK_* to http://rust:8082 etc. (see docker-compose.yml).
  stack:
    rust-base-url: http://127.0.0.1:8082
    python-base-url: http://127.0.0.1:5000
    prometheus-base-url: http://127.0.0.1:9090
    grafana-base-url: http://127.0.0.1:3000
    elasticsearch-base-url: http://127.0.0.1:9200
    kibana-base-url: http://127.0.0.1:5601
    react-node-base-url: http://127.0.0.1:5174
    rust-browser-url: http://127.0.0.1:8082/
    python-browser-url: http://127.0.0.1:5000/
    prometheus-browser-url: http://127.0.0.1:9090/
    grafana-browser-url: http://127.0.0.1:3000/
    elasticsearch-browser-url: http://127.0.0.1:9200/
    kibana-browser-url: http://127.0.0.1:5601/
    react-node-browser-url: http://127.0.0.1:5174/

---
# Optional: spring.profiles.active=postgres
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:demo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

---
# Compose dev overlay: serve /js and other static assets from src/ (see docker-compose.dev.yml).
spring:
  config:
    activate:
      on-profile: dev-static
  web:
    resources:
      static-locations:
        - file:src/main/resources/static/
        - classpath:/static/
