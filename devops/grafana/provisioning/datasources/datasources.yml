# https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources
# Files in this directory are loaded on startup. Edit and restart Grafana.

apiVersion: 1

# Reset Elasticsearch if UI edits corrupted timeField (Grafana error: "timeField cannot be cast to string").
# Also remove duplicate UI-created datasource (lowercase name "elasticsearch" with empty config).
deleteDatasources:
  - name: Elasticsearch
    orgId: 1
  - name: elasticsearch
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST

  - name: TestData
    type: testdata
    uid: testdata
    access: proxy
    isDefault: false
    editable: true

  # Same Compose network as docker-compose.apps.yml (service name `postgres`).
  - name: PostgreSQL
    type: postgres
    uid: postgres-demo
    access: proxy
    url: postgres:5432
    user: postgres
    isDefault: false
    editable: true
    secureJsonData:
      password: postgres
    jsonData:
      database: demo
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false

  # Requires docker-compose.observability.yml (ELK + Filebeat) on network exercises.
  # index + interval: Daily are required for logstash-YYYY.MM.DD daily indices (see Grafana ES docs).
  - name: Elasticsearch
    type: elasticsearch
    uid: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    jsonData:
      index: "[logstash-]YYYY.MM.DD"
      interval: Daily
      timeField: "@timestamp"
      esVersion: "8.0.0"
      logMessageField: message
      logLevelField: level
      maxConcurrentShardRequests: 5
    isDefault: false
    editable: false
