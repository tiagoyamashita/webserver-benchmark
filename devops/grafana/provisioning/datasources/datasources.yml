# https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources
# Files in this directory are loaded on startup. Edit and restart Grafana.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST

  - name: TestData
    type: testdata
    uid: testdata
    access: proxy
    isDefault: false
    editable: true

  # --- Uncomment when ELK is running from the *same* root compose project (or elk/ compose) ---
