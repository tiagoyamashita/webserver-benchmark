# https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources
# Files in this directory are loaded on startup. Edit and restart Grafana.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST

  - name: TestData
    type: testdata
    uid: testdata
    access: proxy
    isDefault: false
    editable: true

  # Same Compose network as docker-compose.apps.yml (service name `postgres`).
  - name: PostgreSQL
    type: postgres
    uid: postgres-demo
    access: proxy
    url: postgres:5432
    user: postgres
    isDefault: false
    editable: true
    secureJsonData:
      password: postgres
    jsonData:
      database: demo
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false

  # --- Uncomment when ELK is running from the *same* root compose project (or elk/ compose) ---
