# Kibana settings for the local ELK Compose stack.
# Mounted into the official image; see docker-compose.yml.
#
# https://www.elastic.co/guide/en/kibana/current/settings.html

server.host: "0.0.0.0"
server.name: "kibana-local"
# Browser URL for redirects / embeds (host). elasticsearch.hosts below stays the Compose service name.
server.publicBaseUrl: "http://localhost:5601"

elasticsearch.hosts:
  - "http://elasticsearch:9200"
