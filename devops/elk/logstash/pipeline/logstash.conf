# Beats (e.g. Filebeat) -> Elasticsearch
# Send to localhost:5044 when running outside Docker; use host logstash:5044 from another container on the elk network.

input {
  beats {
    port => 5044
  }
}

filter {
  # Prefer application event time over Filebeat harvest time (Beats overwrites JSON @timestamp).
  ruby {
    code => '
      require "time"

      def parse_app_time(raw)
        return nil if raw.nil?
        s = raw.to_s.strip
        return nil if s.empty?

        if s =~ /^(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2}:\d{2})(?:\.(\d+))? UTC$/
          frac = ($3 || "0").ljust(6, "0")[0, 6]
          return Time.strptime("#{$1} #{$2}.#{frac}", "%Y-%m-%d %H:%M:%S.%f").utc
        end

        Time.parse(s).utc
      rescue StandardError
        nil
      end

      raw_ts = event.get("timestamp")
      parsed = parse_app_time(raw_ts)
      if parsed.nil?
        at = event.get("@timestamp")
        if at.is_a?(LogStash::Timestamp)
          parsed = at.time.utc
        else
          parsed = parse_app_time(at)
        end
      end

      if parsed
        event.set("@timestamp", LogStash::Timestamp.new(parsed))
      end
      if raw_ts && !raw_ts.is_a?(LogStash::Timestamp)
        event.set("log_timestamp", raw_ts.to_s)
      end
      event.remove("timestamp")
    '
  }

  # tracing-subscriber (Rust) nests event fields under "fields"; flatten to match Java/Python JSON.
  if [fields][message] {
    ruby {
      code => '
        nested = event.get("fields")
        if nested.is_a?(Hash)
          nested.each do |key, value|
            event.set(key, value) unless event.get(key)
          end
          event.remove("fields")
        end
        event.remove("target")
      '
    }
  }

  # Stable call-stack ordering when timestamps tie: Java → Rust/Python → Postgres.
  if [service] {
    ruby {
      code => '
        order = case event.get("service")
                when "exercises-java" then 1
                when "exercises-rust", "exercises-python", "exercises-react-node", "exercises-zig" then 2
                when "exercises-postgres" then 3
                when "exercises-kafka" then 4
                else 9
                end
        event.set("service_order", order)
      '
    }
  }

  # Grafana sort: event time first; log_seq breaks ties only within the same service (same ms).
  ruby {
    code => '
      at = event.get("@timestamp")
      next unless at.is_a?(LogStash::Timestamp)

      order = event.get("service_order") || 9
      seq = event.get("log_seq") || 0
      epoch_ms = (at.to_f * 1000).to_i
      event.set("sort_key", epoch_ms * 1000 + order * 100 + seq)
    '
  }

  # Postgres jsonlog: drop simple-query "statement:" noise (SET/BEGIN/empty JDBC pings).
  # Extended-protocol CRUD stays as "execute …" when log_statement=mod|all.
  if [service] == "exercises-postgres" and [message] =~ /^statement:/ {
    drop { }
  }

  # Postgres: copy request_id / session_id from stamped application_name for Grafana correlation.
  if [service] == "exercises-postgres" and [application_name] {
    ruby {
      code => '
        app = event.get("application_name")
        if app.is_a?(String)
          req = app.match(/;req=([^;]+)/)
          if req
            event.set("request_id", req[1]) unless event.get("request_id")
          end
          sid = app.match(/;sid=([^;]+)/)
          if sid
            event.set("session_id", sid[1]) unless event.get("session_id")
          else
            compact_sid = app.match(/;s=([^;]+)/)
            if compact_sid
              event.set("session_id", compact_sid[1]) unless event.get("session_id")
            end
          end
        end
      '
    }
  }

  # Controller HTTP snapshots (headers/body/url_params) are JSON objects in app logs.
  # Older logstash-* indices mapped these fields as text; stringify so indexing never 400s.
  ruby {
    code => '
      %w[body headers url_params].each do |field|
        value = event.get(field)
        next if value.nil?
        next if value.is_a?(String)
        begin
          event.set(field, LogStash::Json.dump(value))
        rescue StandardError
          event.set(field, value.to_s)
        end
      end
      # Postgres jsonlog uses human-readable datetimes that clash with ES date mappings.
      %w[session_start].each do |field|
        value = event.get(field)
        next if value.nil?
        next if value.is_a?(LogStash::Timestamp)
        event.set("#{field}_raw", value.to_s)
        event.remove(field)
      end
    '
  }

  # Flatten stringified url_params into top-level url_param_<key> fields for Kibana/Grafana queries.
  ruby {
    code => '
      raw = event.get("url_params")
      if raw.is_a?(String) && !raw.empty? && raw != "{}"
        begin
          parsed = LogStash::Json.load(raw)
          if parsed.is_a?(Hash)
            parsed.each do |key, value|
              next if value.nil?
              flat_key = "url_param_#{key}"
              next if event.get(flat_key)

              flat_val = case value
                         when Array then value.map(&:to_s).join(",")
                         else value.to_s
                         end
              next if flat_val.empty?

              event.set(flat_key, flat_val)
            end
          end
        rescue StandardError
        end
      end
    '
  }

  # session_id from headers when apps log headers but omit top-level session_id (e.g. cookie auth).
  ruby {
    code => '
      next if event.get("session_id")

      raw = event.get("headers")
      next if raw.nil?

      parsed = raw
      if raw.is_a?(String) && !raw.empty?
        begin
          parsed = LogStash::Json.load(raw)
        rescue StandardError
          parsed = nil
        end
      end
      next unless parsed.is_a?(Hash)

      sid = parsed["x-session-id"]
      sid = sid.to_s.strip if sid
      if sid.nil? || sid.empty?
        cookie = parsed["cookie"]
        if cookie.is_a?(String)
          cookie.split(";").each do |part|
            part = part.strip
            if part.start_with?("exercises_session=")
              sid = part.split("=", 2)[1]&.strip
              break
            end
          end
        end
      end
      if (sid.nil? || sid.empty?) && parsed["authorization"].is_a?(String)
        auth = parsed["authorization"].strip
        if auth.downcase.start_with?("bearer ")
          sid = auth[7..].strip
        end
      end
      if sid && !sid.empty?
        event.set("session_id", sid)
      end
    '
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "logstash-%{+YYYY.MM.dd}"
  }
}
