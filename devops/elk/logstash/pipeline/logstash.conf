# Beats (e.g. Filebeat) -> Elasticsearch
# Send to localhost:5044 when running outside Docker; use host logstash:5044 from another container on the elk network.

input {
  beats {
    port => 5044
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "logstash-%{+YYYY.MM.dd}"
  }
}
