# Used by the root docker-compose.yml filebeat service.
# Tails Java / Python / Rust / React Node / Zig / Postgres observability JSON logs and ships to Logstash.

filebeat.inputs:
  - type: filestream
    id: exercises-java-json
    enabled: true
    paths:
      - /var/log/java/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-java
    fields_under_root: true

  - type: filestream
    id: exercises-python-json
    enabled: true
    paths:
      - /var/log/python/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-python
    fields_under_root: true

  - type: filestream
    id: exercises-rust-json
    enabled: true
    paths:
      - /var/log/rust/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-rust
    fields_under_root: true

  - type: filestream
    id: exercises-react-node-json
    enabled: true
    paths:
      - /var/log/react-node/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-react-node
    fields_under_root: true

  - type: filestream
    id: exercises-zig-json
    enabled: true
    paths:
      - /var/log/zig/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-zig
    fields_under_root: true

  - type: filestream
    id: exercises-postgres-json
    enabled: true
    paths:
      # Postgres log_filename=postgresql-%Y-%m-%d (optional .json suffix depending on rotation)
      - /var/log/postgresql/postgresql-*
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-postgres
    fields_under_root: true

  - type: filestream
    id: exercises-kafka-json
    enabled: true
    paths:
      - /var/log/kafka/kafka*.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-kafka
    fields_under_root: true

processors:
  # Kafka logs use string field "event"; Logstash beats input expects ECS "event" as an object.
  - rename:
      fields:
        - from: event
          to: kafka_event
      ignore_missing: true
      fail_on_error: false
  # Prefer application event time over Filebeat harvest time (more precise for call-stack ordering).
  # Apps emit JSON field "timestamp" (Rust/Postgres/Java/Python/React Node). Logstash re-parses if this fails.
  - timestamp:
      field: timestamp
      timezone: UTC
      layouts:
        - '2006-01-02 15:04:05.999 UTC'
        - '2006-01-02 15:04:05 UTC'
        - '2006-01-02T15:04:05.999999999Z'
        - '2006-01-02T15:04:05.999999Z'
        - '2006-01-02T15:04:05.999Z'
        - '2006-01-02T15:04:05Z'
      ignore_missing: true
      ignore_failure: true
  - add_host_metadata: {}

output.logstash:
  hosts: ["logstash:5044"]

# Internal metrics API for beat-exporter / Prometheus (Compose network only).
http.enabled: true
http.host: 0.0.0.0
http.port: 5066

# Logstash owns index naming (logstash-YYYY.MM.dd); disable direct ES setup.
setup.ilm.enabled: false
setup.template.enabled: false
