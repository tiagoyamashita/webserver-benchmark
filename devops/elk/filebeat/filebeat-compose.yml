# Used by the root docker-compose.yml filebeat service.
# Tails Java / Python / Rust / React Node / Postgres observability JSON logs and ships to Logstash.

filebeat.inputs:
  - type: filestream
    id: exercises-java-json
    enabled: true
    paths:
      - /var/log/java/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-java
    fields_under_root: true

  - type: filestream
    id: exercises-python-json
    enabled: true
    paths:
      - /var/log/python/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-python
    fields_under_root: true

  - type: filestream
    id: exercises-rust-json
    enabled: true
    paths:
      - /var/log/rust/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-rust
    fields_under_root: true

  - type: filestream
    id: exercises-react-node-json
    enabled: true
    paths:
      - /var/log/react-node/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-react-node
    fields_under_root: true

  - type: filestream
    id: exercises-postgres-json
    enabled: true
    paths:
      # Postgres log_filename=postgresql-%Y-%m-%d (optional .json suffix depending on rotation)
      - /var/log/postgresql/postgresql-*
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-postgres
    fields_under_root: true

processors:
  # Java dashboard logs use a string field "event"; Logstash beats input expects ECS "event" as an object.
  - rename:
      fields:
        - from: event
          to: ui_event
      ignore_missing: true
      fail_on_error: false
  # Prefer application event time over Filebeat harvest time (more precise for call-stack ordering).
  # Rust: JSON field "timestamp". Java/Python/React Node: "@timestamp" in JSON (ndjson keys_under_root).
  - timestamp:
      field: timestamp
      layouts:
        - '2006-01-02T15:04:05.999999999Z'
        - '2006-01-02T15:04:05.999999Z'
        - '2006-01-02T15:04:05.999Z'
        - '2006-01-02T15:04:05Z'
        - '2006-01-02 15:04:05.999 UTC'
      ignore_missing: true
      ignore_failure: true
  - timestamp:
      field: "@timestamp"
      layouts:
        - '2006-01-02T15:04:05.999999999Z'
        - '2006-01-02T15:04:05.999999Z'
        - '2006-01-02T15:04:05.999Z'
        - '2006-01-02T15:04:05Z'
      ignore_missing: true
      ignore_failure: true
      when:
        not:
          has_fields: ["timestamp"]
  - add_host_metadata: {}

output.logstash:
  hosts: ["logstash:5044"]

# Internal metrics API for beat-exporter / Prometheus (Compose network only).
http.enabled: true
http.host: 0.0.0.0
http.port: 5066

# Logstash owns index naming (logstash-YYYY.MM.dd); disable direct ES setup.
setup.ilm.enabled: false
setup.template.enabled: false
