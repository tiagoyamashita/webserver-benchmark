# Used by the root docker-compose.yml filebeat service.
# Tails Java / Python / Rust / Postgres observability JSON logs and ships to Logstash.

filebeat.inputs:
  - type: filestream
    id: exercises-java-json
    enabled: true
    paths:
      - /var/log/java/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true

  - type: filestream
    id: exercises-python-json
    enabled: true
    paths:
      - /var/log/python/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true

  - type: filestream
    id: exercises-rust-json
    enabled: true
    paths:
      - /var/log/rust/demo-app.json.log
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true

  - type: filestream
    id: exercises-postgres-json
    enabled: true
    paths:
      - /var/log/postgresql/*.json
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
    fields:
      service: exercises-postgres
    fields_under_root: true

processors:
  # Java dashboard logs use a string field "event"; Logstash beats input expects ECS "event" as an object.
  - rename:
      fields:
        - from: event
          to: ui_event
      ignore_missing: true
      fail_on_error: false
  - add_host_metadata: {}

output.logstash:
  hosts: ["logstash:5044"]

# Logstash owns index naming (logstash-YYYY.MM.dd); disable direct ES setup.
setup.ilm.enabled: false
setup.template.enabled: false
