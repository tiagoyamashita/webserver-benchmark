apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elk.fullname" . }}-logstash-pipeline
  labels:
    {{- include "elk.labels" . | nindent 4 }}
    app.kubernetes.io/component: logstash
data:
  logstash.conf: |
    input {
      beats {
        port => {{ .Values.logstash.service.beatsPort }}
      }
    }

    output {
      elasticsearch {
        hosts    => ['{{ include "elk.elasticsearchHost" . }}']
        index    => "logstash-%{+YYYY.MM.dd}"
      }
    }
