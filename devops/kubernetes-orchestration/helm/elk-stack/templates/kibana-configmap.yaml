apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elk.fullname" . }}-kibana-config
  labels:
    {{- include "elk.labels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
data:
  kibana.yml: |
    server.host: "0.0.0.0"
    server.name: "kibana-k8s"
    elasticsearch.hosts:
      - '{{ include "elk.elasticsearchHost" . }}'
