apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "exercises.fullname" . }}-rust
  labels:
    {{- include "exercises.labels" . | nindent 4 }}
    app.kubernetes.io/component: rust
spec:
  replicas: {{ .Values.rust.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: rust
  template:
    metadata:
      labels:
        {{- include "exercises.labels" . | nindent 8 }}
        app.kubernetes.io/component: rust
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rust.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rust.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rust.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: rust
          {{- if .Values.global.imageRegistry }}
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.rust.image.repository }}:{{ .Values.rust.image.tag }}"
          {{- else }}
          image: "{{ .Values.rust.image.repository }}:{{ .Values.rust.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.rust.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.rust.service.port }}
          env:
            - name: EXERCISES_WEB_HOST
              value: "0.0.0.0"
            - name: EXERCISES_WEB_PORT
              value: {{ .Values.rust.service.port | quote }}
            - name: EXERCISES_RUST_ROOT
              value: /app
          {{- with .Values.rust.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
