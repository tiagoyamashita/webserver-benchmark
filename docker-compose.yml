# Full stack from repo root — apps + observability (same Compose project / network).
#
#   podman compose up -d --build
#
# Split control (restart apps without touching Grafana / ELK / Prometheus):
#   podman compose -f docker-compose.apps.yml up -d --build
#   podman compose -f docker-compose.observability.yml up -d
#   podman compose -f docker-compose.apps.yml restart java rust
#
# Dev hot-reload: add -f docker-compose.dev.yml to the apps command (or all three files).
#
# Do not also run devops/elk/docker-compose.yml or devops/grafana/docker-compose.yml on the same host (duplicate ports).

include:
  - docker-compose.apps.yml
  - docker-compose.observability.yml
