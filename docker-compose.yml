# Podman: use `podman-compose` or `podman compose` (Compose v2).
# Run from repository root: docker compose up --build
services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
    ports:
      - "5432:5432"
    volumes:
      - exercises_pg_data:/var/lib/postgresql/data

  java:
    build:
      context: ./java
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres

  python:
    build:
      context: ./python
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      FLASK_RUN_HOST: "0.0.0.0"
      FLASK_RUN_PORT: "5000"
      EXERCISES_PROJECT_ROOT: /app

  rust:
    build:
      context: ./rust
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      EXERCISES_WEB_HOST: "0.0.0.0"
      EXERCISES_WEB_PORT: "8082"
      EXERCISES_RUST_ROOT: /app

volumes:
  exercises_pg_data:
