# Podman: from repo root — podman compose up --build   (or: docker compose up --build)
# Starts postgres + java + python + rust + react-node + Grafana + ELK + Filebeat + Prometheus (app JSON logs -> Filebeat -> Logstash -> ES; Grafana loads exercises dashboard JSON).
# React Node (React + Express stack probes): http://127.0.0.1:5174/
# To skip ELK only (lighter): podman compose up --build postgres java python rust react-node grafana prometheus
# Do not also run elk/docker-compose.yml or grafana/docker-compose.yml on the same host (duplicate ports).
#
# All services share network "exercises" — reach each other by DNS name, e.g. http://postgres:5432,
# http://java:8080, http://prometheus:9090, http://elasticsearch:9200 (from inside any container on this project).
services:
  postgres:
    image: docker.io/library/postgres:16
    networks: [exercises]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
    ports:
      - "5432:5432"
    volumes:
      - exercises_pg_data:/var/lib/postgresql/data

  java:
    build:
      context: ./java
      dockerfile: Dockerfile
      args:
        SKIP_TESTS: "true"
        CACHE_BUST: ${CACHE_BUST:-1}
    networks: [exercises]
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres,observability
      LOG_PATH: /app/logs
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      # Server-side stack ping from Java: use Compose DNS names (not localhost — that is the Java container).
      APP_STACK_RUST_BASE_URL: http://rust:8082
      APP_STACK_PYTHON_BASE_URL: http://python:5000
      APP_STACK_PROMETHEUS_BASE_URL: http://prometheus:9090
      APP_STACK_GRAFANA_BASE_URL: http://grafana:3000
      APP_STACK_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      APP_STACK_KIBANA_BASE_URL: http://kibana:5601
      APP_STACK_REACT_NODE_BASE_URL: http://react-node:5174
    volumes:
      - ./java/logs:/app/logs
    depends_on:
      - postgres

  python:
    build:
      context: ./python
      dockerfile: Dockerfile
    networks: [exercises]
    ports:
      - "5000:5000"
    environment:
      FLASK_RUN_HOST: "0.0.0.0"
      FLASK_RUN_PORT: "5000"
      EXERCISES_PROJECT_ROOT: /app
      EXERCISES_OBSERVABILITY: "1"
      LOG_PATH: /app/logs
      APP_STACK_JAVA_BASE_URL: http://java:8080
      APP_STACK_RUST_BASE_URL: http://rust:8082
      APP_STACK_PROMETHEUS_BASE_URL: http://prometheus:9090
      APP_STACK_GRAFANA_BASE_URL: http://grafana:3000
      APP_STACK_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      APP_STACK_KIBANA_BASE_URL: http://kibana:5601
      APP_STACK_REACT_NODE_BASE_URL: http://react-node:5174
    volumes:
      - ./python/logs:/app/logs

  rust:
    build:
      context: ./rust
      dockerfile: Dockerfile
    networks: [exercises]
    ports:
      - "8082:8082"
    environment:
      EXERCISES_WEB_HOST: "0.0.0.0"
      EXERCISES_WEB_PORT: "8082"
      EXERCISES_RUST_ROOT: /app
      EXERCISES_OBSERVABILITY: "1"
      LOG_PATH: /app/logs
      EXERCISES_JAVA_BASE_URL: http://java:8080
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    volumes:
      - ./rust/logs:/app/logs
    depends_on:
      - postgres
      - java
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # React + Express; server-side GET probes use Compose DNS (browser cannot use service names directly).
  react-node:
    build:
      context: ./react-node
      dockerfile: Dockerfile
    networks: [exercises]
    ports:
      - "5174:5174"
    environment:
      NODE_ENV: production
      PORT: "5174"
      PROBE_JAVA_URL: http://java:8080
      PROBE_RUST_URL: http://rust:8082
      PROBE_PYTHON_URL: http://python:5000
      PROBE_PROMETHEUS_URL: http://prometheus:9090
      PROBE_GRAFANA_URL: http://grafana:3000
      PROBE_ELASTICSEARCH_URL: http://elasticsearch:9200
      PROBE_KIBANA_URL: http://kibana:5601
    depends_on:
      - java
      - python
      - rust
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5174/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ELK — lab defaults (security off). See elk/README.md
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    networks: [exercises]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - exercises_es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.5
    networks: [exercises]
    depends_on:
      - elasticsearch
    ports:
      - "5044:5044"
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.5
    networks: [exercises]
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro

  # Ships Java / Python / Rust JSON logs -> Logstash :5044. See elk/README.md
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.5
    user: root
    networks: [exercises]
    depends_on:
      - logstash
      - java
      - python
      - rust
    volumes:
      - ./elk/filebeat/filebeat-compose.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./java/logs:/var/log/java:ro
      - ./python/logs:/var/log/python:ro
      - ./rust/logs:/var/log/rust:ro
    command: ["filebeat", "-e", "-strict.perms=false"]
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana-oss:11.5.2
    networks: [exercises]
    init: true
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Listen on all interfaces inside the container (avoids “works in Docker, blank in Podman” cases).
      GF_SERVER_HTTP_ADDR: "0.0.0.0"
      # Match how you open the UI (localhost vs 127.0.0.1); wrong root_url breaks redirects/cookies.
      GF_SERVER_ROOT_URL: http://127.0.0.1:3000/
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      # Allow embedding in <iframe> (parent page must be trusted; off by default in Grafana).
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - exercises_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # RW: file provisioning may touch the dashboards dir; RO overlays caused issues on some Podman setups.
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  prometheus:
    image: docker.io/prom/prometheus:v2.55.1
    networks: [exercises]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - java
      - python
      - rust

networks:
  exercises:
    driver: bridge

volumes:
  exercises_pg_data:
  exercises_es_data:
  exercises_grafana_data:
