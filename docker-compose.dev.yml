# Hot-reload dev overlay — use with the main compose file:
#
#   podman compose -f docker-compose.yml -f docker-compose.dev.yml up --build postgres java python rust reach-ui
#
# Lighter (no ELK): add grafana prometheus to the command above as needed.
#
# Java: spring-boot:run (first start may download Maven deps into maven-cache; if compile fails, podman volume rm exercises_maven-cache and up again).
# Python: FLASK_DEBUG=1 reloader when ./python changes.
# Rust: cargo-watch rebuilds on src/ and templates/ (first start compiles; can take a few minutes).
# Reach UI: Vite dev server on http://127.0.0.1:5174 (same host port as production nginx mapping).
services:
  java:
    build:
      context: ./java
      dockerfile: Dockerfile.dev
    volumes:
      - ./java:/workspace
      - maven-cache:/root/.m2

  python:
    build:
      context: ./python
      dockerfile: Dockerfile
    volumes:
      - ./python:/app
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      EXERCISES_OBSERVABILITY: "1"
      LOG_PATH: /app/logs
      APP_STACK_JAVA_BASE_URL: http://java:8080
      APP_STACK_RUST_BASE_URL: http://rust:8082
      APP_STACK_PROMETHEUS_BASE_URL: http://prometheus:9090
      APP_STACK_GRAFANA_BASE_URL: http://grafana:3000
      APP_STACK_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      APP_STACK_KIBANA_BASE_URL: http://kibana:5601
      APP_STACK_REACH_UI_BASE_URL: http://reach-ui:5174

  rust:
    build:
      context: ./rust
      dockerfile: Dockerfile.dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 300s
    volumes:
      - ./rust:/app
      - rust-cargo-registry:/usr/local/cargo/registry
      - rust-target:/app/target
    environment:
      RUST_LOG: info
      EXERCISES_OBSERVABILITY: "1"
      LOG_PATH: /app/logs
      EXERCISES_WEB_HOST: "0.0.0.0"
      EXERCISES_WEB_PORT: "8082"
      EXERCISES_RUST_ROOT: /app
      EXERCISES_JAVA_BASE_URL: http://java:8080
      APP_STACK_JAVA_BASE_URL: http://java:8080
      APP_STACK_PYTHON_BASE_URL: http://python:5000
      APP_STACK_PROMETHEUS_BASE_URL: http://prometheus:9090
      APP_STACK_GRAFANA_BASE_URL: http://grafana:3000
      APP_STACK_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      APP_STACK_KIBANA_BASE_URL: http://kibana:5601
      APP_STACK_REACH_UI_BASE_URL: http://reach-ui:5174
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

  reach-ui:
    build:
      context: ./reach-ui
      dockerfile: Dockerfile.dev
    volumes:
      - ./reach-ui:/app
      - reach-ui-node-modules:/app/node_modules
    ports: !override
      - "5174:5174"
    environment:
      VITE_PROXY_DOCKER: "1"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5174"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5174/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  maven-cache:
  rust-cargo-registry:
  rust-target:
  reach-ui-node-modules:
