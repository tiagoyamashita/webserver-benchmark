# Hot-reload dev overlay — apps only (pair with docker-compose.apps.yml):
#
#   podman compose -f docker-compose.apps.yml -f docker-compose.dev.yml up -d --build
#
# Full stack (apps dev + observability prod images):
#   podman compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Observability only (leave running while restarting apps):
#   podman compose -f docker-compose.observability.yml up -d
#
# Java: spring-boot:run (deps in maven-cache; re-runs go-offline when pom.xml changes; if still broken: podman volume rm exercises_maven-cache and up again).
# Python: FLASK_DEBUG=1 reloader when ./apps/python changes.
# Rust: cargo-watch rebuilds on src/ and templates/ (first start compiles; can take a few minutes).
# React Node: Express + Vite middleware on http://127.0.0.1:5174
# react-node dev entrypoint runs npm ci when package-lock.json changes (named node_modules volume).
services:
  java:
    build:
      context: ./apps/java
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env.apps
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: postgres,observability
      LOG_PATH: /workspace/logs
    volumes:
      - ./apps/java:/workspace
      - maven-cache:/root/.m2

  python:
    build:
      context: ./apps/python
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/docker-entrypoint-dev.sh"]
    volumes:
      - ./apps/python:/app
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: !override "1"
      EXERCISES_OBSERVABILITY: "1"
      LOG_PATH: /app/logs
      APP_STACK_JAVA_BASE_URL: http://java:8080
      APP_STACK_RUST_BASE_URL: http://rust:8082
      APP_STACK_PROMETHEUS_BASE_URL: http://prometheus:9090
      APP_STACK_GRAFANA_BASE_URL: http://grafana:3000
      APP_STACK_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      APP_STACK_KIBANA_BASE_URL: http://kibana:5601
      APP_STACK_REACT_NODE_BASE_URL: http://react-node:5174
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

  rust:
    build:
      context: ./apps/rust
      dockerfile: Dockerfile.dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 300s
    volumes:
      - ./apps/rust:/app
      - rust-cargo-registry:/usr/local/cargo/registry
      - rust-target:/app/target
    environment:
      RUST_LOG: info
      EXERCISES_OBSERVABILITY: "1"
      LOG_PATH: /app/logs
      EXERCISES_WEB_HOST: "0.0.0.0"
      EXERCISES_WEB_PORT: "8082"
      EXERCISES_RUST_ROOT: /app
      EXERCISES_JAVA_BASE_URL: http://java:8080
      APP_STACK_JAVA_BASE_URL: http://java:8080
      APP_STACK_PYTHON_BASE_URL: http://python:5000
      APP_STACK_PROMETHEUS_BASE_URL: http://prometheus:9090
      APP_STACK_GRAFANA_BASE_URL: http://grafana:3000
      APP_STACK_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      APP_STACK_KIBANA_BASE_URL: http://kibana:5601
      APP_STACK_REACT_NODE_BASE_URL: http://react-node:5174
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

  react-node:
    build:
      context: ./apps/react-node
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/react-node:/app
      - react-node-node-modules:/app/node_modules
    ports: !override
      - "5174:5174"
    environment:
      NODE_ENV: !override development
      PORT: "5174"
      EXERCISES_OBSERVABILITY: "1"
      LOG_PATH: /app/logs
      PROBE_JAVA_URL: http://java:8080
      PROBE_RUST_URL: http://rust:8082
      PROBE_PYTHON_URL: http://python:5000
      PROBE_PROMETHEUS_URL: http://prometheus:9090
      PROBE_GRAFANA_URL: http://grafana:3000
      PROBE_ELASTICSEARCH_URL: http://elasticsearch:9200
      PROBE_KIBANA_URL: http://kibana:5601
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: demo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5174/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  maven-cache:
  rust-cargo-registry:
  rust-target:
  react-node-node-modules:
