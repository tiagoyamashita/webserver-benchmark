# Observability stack — Prometheus, Grafana, ELK, Filebeat.
#
# Start / leave running while restarting apps:
#   podman compose -f docker-compose.observability.yml up -d
#   podman compose -f docker-compose.observability.yml restart grafana
#
# Shares network "exercises" with docker-compose.apps.yml (same Compose project name).
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    networks: [exercises]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - exercises_es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.5
    networks: [exercises]
    depends_on:
      - elasticsearch
    ports:
      - "5044:5044"
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.5
    networks: [exercises]
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.5
    user: root
    networks: [exercises]
    depends_on:
      - logstash
    volumes:
      - ./elk/filebeat/filebeat-compose.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./postgres/logs:/var/log/postgresql:ro
      - ./java/logs:/var/log/java:ro
      - ./python/logs:/var/log/python:ro
      - ./rust/logs:/var/log/rust:ro
    command: ["filebeat", "-e", "-strict.perms=false"]
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:v2.55.1
    networks: [exercises]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  grafana:
    image: docker.io/grafana/grafana-oss:11.5.2
    networks: [exercises]
    init: true
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_ADDR: "0.0.0.0"
      GF_SERVER_ROOT_URL: http://127.0.0.1:3000/
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - exercises_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

networks:
  exercises:
    name: exercises
    driver: bridge

volumes:
  exercises_es_data:
  exercises_grafana_data:
