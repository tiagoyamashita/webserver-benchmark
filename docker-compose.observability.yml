# Observability stack — Prometheus, Grafana, ELK, Filebeat.
#
# Grafana admin password: edit .env.observability (see .env.observability.example).
#
# Start / leave running while restarting apps:
#   podman compose -f docker-compose.observability.yml up -d
# After editing devops/grafana/dashboards/*.json (on Windows, auto-reload often fails):
#   podman compose -f docker-compose.observability.yml restart grafana
# Then hard-refresh the browser (Ctrl+Shift+R). Dashboard: Exercises → Exercises HTTP requests & SQL logs
#
# After editing prometheus/prometheus.yml (new scrape jobs), reload Prometheus:
#   curl -X POST http://127.0.0.1:9090/-/reload
# After adding podman-exporter, restart observability (socket mount — Linux only):
#   podman compose -f docker-compose.observability.yml --profile podman-metrics up -d podman-exporter
# Windows Podman Machine: devops/prometheus/start-podman-exporter.ps1 (socket lives in the VM, not on Windows).
# After editing filebeat/filebeat-compose.yml, restart Filebeat (HTTP :5066 for metrics):
#   podman compose -f docker-compose.observability.yml restart filebeat beat-exporter
#
# Shares network "exercises" with docker-compose.apps.yml (same Compose project name).
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    networks: [exercises]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - exercises_es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.5
    networks: [exercises]
    depends_on:
      - elasticsearch
    ports:
      - "5044:5044"
    volumes:
      - ./devops/elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./devops/elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.5
    networks: [exercises]
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    volumes:
      - ./devops/elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro

  kibana-setup:
    image: docker.io/curlimages/curl:8.11.1
    networks: [exercises]
    depends_on:
      - kibana
    volumes:
      - ./devops/elk/kibana:/kibana:ro
    environment:
      KIBANA_URL: http://kibana:5601
    entrypoint: ["/bin/sh", "/kibana/provision-kibana.sh"]
    restart: "no"

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.5
    user: root
    networks: [exercises]
    depends_on:
      - logstash
    volumes:
      - ./devops/elk/filebeat/filebeat-compose.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./apps/postgres/logs:/var/log/postgresql:ro
      - ./apps/java/logs:/var/log/java:ro
      - ./apps/python/logs:/var/log/python:ro
      - ./apps/rust/logs:/var/log/rust:ro
      - ./apps/react-node/logs:/var/log/react-node:ro
      - ./apps/kafka/logs:/var/log/kafka:ro
    command: ["filebeat", "-e", "-strict.perms=false"]
    restart: unless-stopped

  beat-exporter:
    image: docker.io/trustpilot/beat-exporter:latest
    networks: [exercises]
    depends_on:
      - filebeat
    command:
      - -beat.uri=http://filebeat:5066
      - -beat.timeout=5s
    restart: unless-stopped

  logstash-exporter:
    image: ghcr.io/sap/prometheus-logstash-exporter:latest
    networks: [exercises]
    depends_on:
      - logstash
    command:
      - -logstash.host=logstash
      - -logstash.port=9600
      - -logstash.timeout=5s
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:v2.55.1
    networks: [exercises]
    ports:
      - "9090:9090"
    volumes:
      - ./devops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  # Per-container CPU/RAM (optional — profile podman-metrics). Socket bind mount fails on Windows
  # host compose; use devops/prometheus/start-podman-exporter.ps1 instead (runs inside Podman Machine).
  podman-exporter:
    profiles: ["podman-metrics"]
    image: quay.io/navidys/prometheus-podman-exporter:v1.14.0
    networks: [exercises]
    ports:
      - "9882:9882"
    environment:
      CONTAINER_HOST: unix:///run/podman/podman.sock
    volumes:
      - /run/podman/podman.sock:/run/podman/podman.sock
    user: "0"
    security_opt:
      - label=type:container_runtime_t
    command:
      - --collector.enable-all
      - --web.listen-address=:9882
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana-oss:11.5.2
    networks: [exercises]
    init: true
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    env_file:
      - .env.observability
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_ADDR: "0.0.0.0"
      GF_SERVER_ROOT_URL: http://127.0.0.1:3000/
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
    volumes:
      - exercises_grafana_data:/var/lib/grafana
      - ./devops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./devops/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

networks:
  exercises:
    name: exercises
    driver: bridge

volumes:
  exercises_es_data:
  exercises_grafana_data:
